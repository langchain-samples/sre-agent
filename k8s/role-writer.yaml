# Cluster-wide write permissions for the SRE bot.
#
# Granted across all namespaces via ClusterRole + ClusterRoleBinding.
# ALL writes are still gated by HITL (human approval) inside the agent.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-writer
  labels:
    app.kubernetes.io/name: sre-agent
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
      - statefulsets
      - daemonsets
    verbs: ["patch", "update"]

  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: [""]
    resources:
      - pods
    verbs: ["delete"]

  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["patch", "update"]

  - apiGroups: [""]
    resources:
      - configmaps
      - services
    verbs: ["create", "patch", "update", "delete"]

  # Custom resource writes — all CRD groups, gated by HITL
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["create", "patch", "update", "delete"]
