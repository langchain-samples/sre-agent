# Deploy everything in order:
#   kubectl apply -k k8s/
#
# Write access is granted cluster-wide via ClusterRole + ClusterRoleBinding.
# All writes are still gated by HITL (human approval) inside the agent.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - role-writer.yaml
  - rolebinding-writer.yaml
  - deployment.yaml
  - service.yaml
