apiVersion: v1
kind: Service
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app.kubernetes.io/name: sre-agent
spec:
  selector:
    app: sre-agent
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# Optional: expose outside the cluster via port-forward or an Ingress.
# To access locally: kubectl port-forward svc/sre-agent 8080:80 -n sre-agent
